<h1 class="page-title">Edit Note</h1>

<div class="editor-card">

  <div class="field">
    <label>Title</label>
    <div 
      class="edit-title"
      contenteditable="true"
      #title>
      {{ note.title || 'Untitled note...' }}
    </div>
  </div>

  <div class="field">
    <label>Content</label>
    <div 
      class="edit-content"
      contenteditable="true"
      #content>
      {{ note.content || 'Start writing...' }}
    </div>
  </div>

  <div class="actions">
    <button class="save-btn" (click)="save(title, content)">Save</button>
    <button class="back-btn" routerLink="/">Back</button>
  </div>

</div>
