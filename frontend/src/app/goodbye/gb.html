<h1>Notes List</h1>
<p>{{ notes.length }}</p>

<hr>
<div *ngFor="let note of notes">
  <h3>{{ note.title }}</h3>
  <p>{{ note.content }}</p>

  <button [routerLink]="['/edit', note.id]">Edit</button>
  <button (click)="delete(note.id)">Delete</button>
</div>

<button (click)="new()">New note</button>
